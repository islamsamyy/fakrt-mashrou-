api_routes:
  - path: /api/invest
    method: POST
    auth_required: true
    rate_limit: Standard
    description: Create new investment record
    validation:
      - projectId (required, string)
      - amount (required, number, 1000-10000000 SAR)
      - notes (optional, string)
    response_format:
      success: boolean
      data:
        investmentId: string
        projectId: string
        amount: number
        status: string (pending)
      error: string
      statusCode: number
    error_cases:
      - 400: Invalid project ID, amount not a number, amount too low/high
      - 401: User not authenticated
      - 403: Investor trying to invest in own project
      - 404: Project not found
      - 409: Project not accepting investments, duplicate investment attempt

  - path: /api/webhooks/stripe
    method: POST
    auth_required: false
    description: Stripe webhook for payment confirmation
    events_handled:
      - checkout.session.completed
    actions:
      - Update investment status to 'paid'
      - Send investment confirmation notification
    security:
      - Signature verification required
      - Metadata validation

  - path: /auth/callback
    method: GET
    auth_required: false
    description: OAuth callback handler for Supabase Auth

database_schema:
  tables:
    - name: profiles
      purpose: User account information
      columns:
        - id (UUID, PK, FK auth.users)
        - email (string)
        - full_name (string)
        - avatar_url (string)
        - role (enum: founder, investor, admin)
        - kyc_status (enum: pending, approved, rejected)
        - kyc_data (jsonb)
        - created_at (timestamp)
        - updated_at (timestamp)

    - name: projects
      purpose: Investment opportunities/ideas
      columns:
        - id (UUID, PK)
        - founder_id (UUID, FK profiles)
        - title (string)
        - description (text)
        - category (string)
        - funding_goal (number)
        - amount_raised (number)
        - status (enum: draft, active, inactive, completed, cancelled)
        - verified (boolean)
        - ai_score (number)
        - img (string)
        - min_invest (number)
        - created_at (timestamp)
        - updated_at (timestamp)

    - name: investments
      purpose: Investment transactions
      columns:
        - id (UUID, PK)
        - investor_id (UUID, FK profiles)
        - project_id (UUID, FK projects)
        - amount (number)
        - status (enum: pending, committed, paid, cancelled)
        - notes (text)
        - created_at (timestamp)
        - updated_at (timestamp)

    - name: messages
      purpose: User-to-user communication
      columns:
        - id (UUID, PK)
        - sender_id (UUID, FK profiles)
        - receiver_id (UUID, FK profiles)
        - content (text)
        - read (boolean)
        - created_at (timestamp)

    - name: saved_opportunities
      purpose: Bookmarked projects
      columns:
        - id (UUID, PK)
        - user_id (UUID, FK profiles)
        - project_id (UUID, FK projects)
        - created_at (timestamp)

    - name: notifications
      purpose: User notifications
      columns:
        - id (UUID, PK)
        - user_id (UUID, FK profiles)
        - type (enum: investment, message, status, kyc)
        - title (string)
        - message (text)
        - link (string)
        - read (boolean)
        - created_at (timestamp)

user_roles:
  - name: founder
    description: Project/idea creators seeking investment
    permissions:
      - create_project
      - edit_own_project
      - view_dashboard_founder
      - receive_messages
      - send_messages
      - view_investors
      - access_funding_progress
    dashboard_access: /dashboard/founder
    protected_routes:
      - /add-idea
      - /projects
      - /projects/[id]/edit
      - /projects/[id]/funding

  - name: investor
    description: Capital providers looking for investment opportunities
    permissions:
      - browse_opportunities
      - make_investments
      - view_portfolio
      - save_opportunities
      - message_founders
      - view_leaderboard
      - complete_kyc
    dashboard_access: /dashboard/investor
    protected_routes:
      - /opportunities
      - /discover
      - /portfolio
      - /saved
      - /checkout
      - /funding-progress

  - name: admin
    description: Platform administrators with full access
    permissions:
      - view_all_content
      - manage_users
      - approve_kyc
      - manage_projects
      - access_admin_panel
      - view_analytics
    dashboard_access: /admin
    protected_routes:
      - /admin
      - /admin/users
      - /admin/kyc

middleware_config:
  protected_paths:
    - /onboarding
    - /dashboard
    - /add-idea
    - /messages
    - /settings
    - /kyc
    - /portfolio
    - /saved
    - /funding-progress
    - /checkout
    - /admin
    - /notifications
  role_based_routes:
    /admin: [admin]
    /dashboard/investor: [investor, admin]
    /dashboard/founder: [founder, admin]
    /portfolio: [investor, admin]
    /saved: [investor, admin]
  auth_redirect: /login
  dashboard_redirect_by_role:
    founder: /dashboard/founder
    investor: /dashboard/investor
    admin: /admin

environment_variables:
  required:
    - NEXT_PUBLIC_SUPABASE_URL
    - NEXT_PUBLIC_SUPABASE_ANON_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_PUBLISHABLE_KEY
    - STRIPE_WEBHOOK_SECRET
    - NEXT_PUBLIC_APP_URL

key_utilities:
  - path: /lib/supabase/client.ts
    purpose: Client-side Supabase initialization
  - path: /lib/supabase/server.ts
    purpose: Server-side Supabase initialization with SSR
  - path: /lib/stripe.ts
    purpose: Stripe payment processing
  - path: /lib/validation.ts
    purpose: Form validation schemas and rules
  - path: /lib/email.ts
    purpose: Email template generation and sending
  - path: /lib/matching.ts
    purpose: AI matching algorithm
  - path: /lib/leaderboard.ts
    purpose: Leaderboard calculations
  - path: /lib/notifications.ts
    purpose: Notification creation and dispatch
  - path: /lib/sanitize.ts
    purpose: Input sanitization and XSS prevention
  - path: /lib/types.ts
    purpose: TypeScript type definitions

security_features:
  - Supabase Row Level Security (RLS) policies
  - Role-based access control (RBAC)
  - JWT authentication via Supabase Auth
  - Stripe webhook signature verification
  - HTTPS only communication
  - AES-256 encryption for sensitive data
  - GDPR compliance for EU users
  - Saudi financial regulation compliance
  - End-to-end encryption for KYC documents
  - Input validation and sanitization
  - SQL injection prevention via parameterized queries
  - XSS protection via React escaping
  - CSRF token support

performance_optimizations:
  - React Compiler enabled (babel-plugin-react-compiler)
  - Image optimization via Next.js Image component
  - Lazy loading for components
  - Server-side rendering for SEO
  - Vercel Analytics and Speed Insights
  - Code splitting and bundle optimization
  - Caching strategies via HTTP headers
  - Database query optimization with indexes

i18n_localization:
  - Primary Language: Arabic (RTL)
  - Secondary Language: English (LTR)
  - locale: ar-SA (default)
  - Direction: RTL (Arabic), LTR (English)
  - Currency: SAR (Saudi Arabian Riyal), USD

testing_infrastructure:
  framework: Playwright 1.59.1
  type: E2E testing
  test_location: /tests directory
  capabilities:
    - Cross-browser testing
    - Visual regression testing
    - Performance testing

design_system:
  color_tokens: Material Design 3
  primary_color: Cyan/Turquoise (#00ffd1)
  secondary_color: Secondary container
  tertiary_color: Tertiary fixed dim
  dark_mode: Supported
  typography:
    - headline font (Material 3 style)
    - body font (Roboto style)
    - data font (monospace for numbers/codes)
  components:
    - Gradient backgrounds
    - Clip-button custom buttons
    - Bracket accents (l-bracket-tr, l-bracket-bl)
    - Neon grid background
    - Scanline effects
    - Hex grid patterns

deployment_info:
  platform: Vercel
  node_version: 20+ (from tsconfig)
  build_command: npm run build
  dev_command: npm run dev
  start_command: npm run start
  monitoring:
    - Vercel Analytics
    - Vercel Speed Insights
  database: Supabase (cloud-hosted PostgreSQL)
  storage: Supabase Storage for documents/images
  cdn: Vercel CDN (included)

