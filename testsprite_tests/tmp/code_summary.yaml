project_name: IDEA BUSINESS
project_description: A Saudi-first investment platform connecting entrepreneurs with verified investors using AI-powered matching. Arabic-first platform for project funding and investment opportunities aligned with Saudi Vision 2030.

tech_stack:
  framework: Next.js 16.2.3
  language: TypeScript
  runtime: Node.js
  react_version: 19.2.4
  database: 
    type: Supabase (PostgreSQL)
    orm: PostgREST API
  authentication:
    provider: Supabase Auth
    mfa: Enabled
    password_recovery: Yes
  styling:
    framework: Tailwind CSS 4.0
    tailwind_plugin: '@tailwindcss/postcss'
    color_system: Material Design 3 tokens
  ui_components:
    - shadcn/ui (via component library)
    - Base UI React 1.3.0
    - Lucide React 1.8.0 (icons)
    - Sonner 2.0.7 (toast notifications)
    - Material Symbols (embedded icon system)
  payments:
    provider: Stripe 22.0.2
    webhook_processing: Yes
    supported_currencies: USD, SAR
  forms_validation: Custom validation library at /lib/validation.ts
  email: Planned (infrastructure in place)
  analytics:
    - Vercel Analytics 2.0.1
    - Vercel Speed Insights 2.0.0
  testing:
    playwright: 1.59.1
    playwright_test: 1.59.1
  deployment: Vercel (Next.js optimized)
  storage: Supabase Storage (document management)
  deployment_framework: Next.js 16.2.3
  react_compiler: Enabled (babel-plugin-react-compiler 1.0.0)

features:
  - name: User Authentication & Onboarding
    description: Multi-role authentication with Supabase. Support for founder, investor, and admin roles. Email-based login and password recovery.
    routes:
      - /login - Login page
      - /register - Account registration
      - /forgot-password - Password reset
      - /reset-password - Password reset completion
      - /onboarding - Guided onboarding flow
      - /auth/callback - OAuth callback handler

  - name: Project/Idea Management
    description: Founders can create, edit, and manage their project listings with rich descriptions, funding goals, and progress tracking.
    routes:
      - /add-idea - Create new project/idea
      - /projects - List all founder projects
      - /projects/[id] - View project details
      - /projects/[id]/edit - Edit project information
      - /projects/[id]/funding - View funding progress
    features:
      - Project creation with title, category, description, funding goal
      - Automatic AI scoring of projects
      - Project status management (active/inactive/draft)
      - Document upload for verification
      - Real-time funding progress tracking
      - Category tags (AI, FinTech, HealthTech, CleanEnergy, SaaS)
      - Image/banner management

  - name: Investment Discovery & Browsing
    description: Dynamic project discovery platform with AI-powered recommendations and advanced filtering.
    routes:
      - /opportunities - Browse all investment opportunities
      - /opportunities/[id] - View opportunity details
      - /discover - Filtered discovery with category selection
      - /trending - Trending/popular projects
      - /leaderboard - Top projects and investors leaderboard
    features:
      - Category-based filtering (AI, FinTech, HealthTech, CleanEnergy, SaaS)
      - Founder profile information
      - Funding progress visualization
      - AI match scoring (percentage match between investor and project)
      - Verified project badges
      - Save/bookmark opportunities feature

  - name: Investment Management
    description: Complete investment lifecycle from discovery to portfolio management.
    routes:
      - /checkout - Investment confirmation page
      - /checkout/success - Success confirmation page
      - /portfolio - View investment portfolio
      - /funding-progress - Track project funding status
    features:
      - Investment amount validation (1K - 10M SAR minimum/maximum)
      - Stripe payment integration with webhook support
      - Investment status tracking (pending, paid, cancelled)
      - Portfolio analytics and returns tracking
      - Saved opportunities management
      - Investment history and transaction records

  - name: Messaging System
    description: Direct communication between investors and founders.
    routes:
      - /messages - Conversation list and chat interface
    features:
      - Real-time messaging between users
      - Message read status tracking
      - Participant profile information in messages
      - Message history persistence
      - Support for direct investor-founder communication

  - name: Notifications System
    description: Real-time user notifications for important platform events.
    features:
      - Investment confirmation notifications
      - New message alerts
      - Project status updates
      - KYC status changes
      - Email and in-app notification support
      - Notification routing by event type (investment, message, status)

  - name: KYC (Know Your Customer) Verification
    description: Multi-step identity verification process for regulatory compliance.
    routes:
      - /kyc - KYC process
    features:
      - Step 1: ID document verification (national ID, passport, residency)
      - Step 2: Address verification with proof of residence
      - Step 3: Tax information and self-certification
      - Document upload to Supabase Storage (kyc-documents bucket)
      - Status tracking (pending, approved, rejected)
      - Support for multiple document types
      - End-to-end encryption for sensitive documents
      - Automatic compliance with GDPR and Saudi financial regulations

  - name: User Profiles & Settings
    description: User account management and profile customization.
    routes:
      - /settings - Account settings and preferences
      - /profile/[id] - Public user profile view
    features:
      - Profile information management
      - Role selection and management
      - KYC data storage in JSON format
      - Avatar/profile picture support
      - Full name and contact information
      - Investment preferences configuration
      - Privacy settings

  - name: Dashboard System
    description: Role-based dashboards with comprehensive analytics and insights.
    routes:
      - /dashboard - Base dashboard redirect
      - /dashboard/founder - Founder-specific dashboard
      - /dashboard/investor - Investor-specific dashboard
    features_founder:
      - Project performance overview
      - Investor interest metrics
      - AI success score (88% recommendation example)
      - Recent activity feed
      - Market insights and trends
      - Investor messages and inquiries
      - Fund raised vs. funding goal progress
      - Top 3% AI rating display
    features_investor:
      - Total portfolio value
      - Interested opportunities count
      - Upcoming meetings tracking
      - Unread messages counter
      - AI-powered investment recommendations
      - Saved opportunities list
      - Investment analytics and returns

  - name: Admin Panel
    description: Administrative controls for platform management and moderation.
    routes:
      - /admin - Admin dashboard
      - /admin/users - User management
      - /admin/kyc - KYC approval/rejection
    features:
      - User metrics (total users, pending KYC count, active projects)
      - Total invested capital tracking
      - KYC verification approval workflow
      - User status management
      - Platform statistics dashboard
      - Content moderation tools

  - name: Static Pages
    description: Information and legal pages.
    routes:
      - / - Homepage with hero section and features
      - /pricing - Pricing and plan information
      - /privacy - Privacy policy
      - /terms - Terms and conditions
      - /trust - Trust and security information
      - /contact - Contact form and support
    features:
      - Hero section with platform status
      - Live market ticker
      - Platform statistics (projects, investors, deals, capital)
      - Feature showcase grid
      - Role selection cards
      - Trending ideas section
      - FAQ section
      - Trust indicators and security badges

  - name: Matching Engine
    description: AI-powered project-to-investor matching algorithm.
    location: /lib/matching.ts
    features:
      - Intelligent matching based on investor preferences
      - AI scoring system
      - Category-based recommendations
      - Interest level calculations
      - Performance analytics for match success

  - name: Email System
    description: Transactional and notification emails.
    location: /lib/email.ts
    features:
      - Investment confirmation emails
      - KYC status updates
      - New message notifications
      - Welcome emails
      - Password reset emails

  - name: Leaderboard
    description: Competitive rankings for projects and investors.
    location: /lib/leaderboard.ts
    route: /leaderboard
    features:
      - Top projects ranking
      - Top investors ranking
      - Performance metrics
      - Historical data tracking

